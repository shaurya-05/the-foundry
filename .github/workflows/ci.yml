name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─── Frontend ────────────────────────────────────────────────────────────────
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
          NEXT_PUBLIC_WS_URL: ws://localhost:8000

  # ─── Backend ─────────────────────────────────────────────────────────────────
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: ankane/pgvector:latest
        env:
          POSTGRES_USER: foundry
          POSTGRES_PASSWORD: foundry_secret
          POSTGRES_DB: foundry_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U foundry"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - run: pip install -r requirements.txt
      - name: Run migrations
        run: |
          for f in migrations/*.sql; do
            PGPASSWORD=foundry_secret psql -h localhost -U foundry -d foundry_db -f "$f"
          done
      - name: Check backend starts and health
        run: |
          timeout 15 uvicorn app.main:app --host 0.0.0.0 --port 8000 &
          sleep 5
          curl -f http://localhost:8000/health || exit 1
          # Test auth endpoints respond
          curl -sf -X POST http://localhost:8000/api/auth/login \
            -H 'Content-Type: application/json' \
            -d '{"email":"test@test.com","password":"test"}' \
            -o /dev/null -w '%{http_code}' | grep -q '401'
          echo "Auth endpoint responding correctly"
          kill %1
        env:
          DATABASE_URL: postgresql://foundry:foundry_secret@localhost:5432/foundry_db
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: ci-test-secret-do-not-use-in-production
          ANTHROPIC_API_KEY: sk-test-placeholder
          VOYAGE_API_KEY: test-placeholder
          NEO4J_URI: bolt://localhost:7687
          NEO4J_USER: neo4j
          NEO4J_PASSWORD: test
          ENVIRONMENT: ci

  # ─── Docker Build Check ─────────────────────────────────────────────────────
  docker:
    runs-on: ubuntu-latest
    needs: [frontend, backend]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Build backend Docker image
        run: docker build -t foundry-backend ./backend
