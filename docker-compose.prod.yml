# Production overrides — use with: docker compose -f docker-compose.yml -f docker-compose.prod.yml up
version: '3.9'

services:
  postgres:
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1'
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  neo4j:
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD}
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1'
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  backend:
    environment:
      DATABASE_URL: postgresql://foundry:${POSTGRES_PASSWORD}@postgres:5432/foundry_db
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      NEO4J_PASSWORD: ${NEO4J_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      ENVIRONMENT: production
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      FRONTEND_URL: ${FRONTEND_URL}
      RESEND_API_KEY: ${RESEND_API_KEY}
      SENTRY_DSN: ${SENTRY_DSN}
    volumes: []  # No source code mounting in production
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1'
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  celery_worker:
    environment:
      DATABASE_URL: postgresql://foundry:${POSTGRES_PASSWORD}@postgres:5432/foundry_db
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      NEO4J_PASSWORD: ${NEO4J_PASSWORD}
    volumes: []
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1'
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
